<!DOCTYPE html>
<html>
<head>
    <title>Vicidial Monitor Pro - Settings</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e1e;
            color: #e0e0e0;
            padding: 20px;
            width: 400px;
        }
        h2 {
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            color: #4CAF50;
        }
        .section {
            margin-bottom: 20px;
            background: #252526;
            padding: 15px;
            border-radius: 8px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }
        input[type="number"], input[type="text"] {
            width: 100%;
            padding: 8px;
            background: #333;
            border: 1px solid #444;
            color: white;
            border-radius: 4px;
            box-sizing: border-box;
        }
        input:focus {
            border-color: #4CAF50;
            outline: none;
        }
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-size: 14px;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #45a049;
        }
        .status {
            margin-top: 10px;
            text-align: center;
            font-size: 12px;
            height: 15px;
            color: #888;
        }
    </style>
</head>
<body>
    <h2>Settings</h2>

    <div class="section">
        <label>Alert Thresholds</label>
        <div style="margin-bottom: 10px;">
            <label style="font-size: 12px; color: #aaa;">Max Waiting Calls (Red Alert)</label>
            <input type="number" id="waitingCallsThreshold" min="1" value="5">
        </div>
        <div>
            <label style="font-size: 12px; color: #aaa;">Max Paused Agents</label>
            <input type="number" id="pausedAgentsThreshold" min="1" value="3">
        </div>
    </div>

    <div class="section">
        <label>Slack Integration</label>
        <div style="margin-bottom: 10px;">
            <label style="font-size: 12px; color: #aaa;">Webhook URL</label>
            <input type="text" id="slackWebhookUrl" placeholder="https://hooks.slack.com/services/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">
        </div>
        <div>
            <label style="font-size: 12px; color: #aaa;">Channel (Optional)</label>
            <input type="text" id="slackChannel" placeholder="#general">
        </div>
        <div style="margin-top: 10px;">
            <button id="testSlack" style="background-color: #2196F3; margin-bottom: 10px;">Test Slack Connection</button>
        </div>
        <div style="margin-top: 10px;">
            <label style="font-size: 12px; color: #aaa;">Refresh Interval (ms)</label>
            <input type="number" id="refreshRate" min="1000" step="1000" value="5000">
        </div>
    </div>

    <div class="section">
        <label>Debugging</label>
        <div style="display: flex; align-items: center;">
            <input type="checkbox" id="debugMode" style="width: auto; margin-right: 10px;">
            <label for="debugMode" style="margin: 0; font-size: 12px; color: #aaa;">Enable Verbose Logging</label>
        </div>
    </div>

    <button id="save">Save Settings</button>
    <div id="status" class="status"></div>

    <script src="utils.js"></script>
    <script src="options.js"></script>
</body>
</html>
