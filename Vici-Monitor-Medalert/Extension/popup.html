<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vicidial Monitor Pro</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="brand">
                <span class="brand-name">Vicidial Monitor Pro</span>
            </div>
            <div class="controls">
                <div id="connection-status" class="status-badge disconnected" title="Connection Status">Disconnected</div>
                <div id="backend-status" class="status-badge disconnected" title="Backend Status">Checking...</div>
            </div>
        </header>

        <!-- Tabs -->
        <nav class="tabs">
            <button class="tab-btn active" data-tab="dashboard">Dashboard</button>
            <button class="tab-btn" data-tab="agents">Agents</button>
            <button class="tab-btn" data-tab="calls">Calls</button>
            <button class="tab-btn" data-tab="settings">Settings</button>
        </nav>

        <!-- Main Content -->
        <main id="main-content">
            <!-- Loading State -->
            <div id="loader" class="state-view">
                <div class="spinner"></div>
                <p>Syncing...</p>
            </div>

            <!-- Error State -->
            <div id="error-state" class="state-view hidden" style="padding-top: 0px; padding-bottom: 24px;">
                <p id="error-msg">No active session found</p>
                <button id="open-dialer-btn" class="action-btn">Open Vicidial</button>
            </div>

            <!-- Tab: Dashboard -->
            <div id="tab-dashboard" class="tab-content active">
                <div class="stat-grid">
                    <div class="stat-card primary">
                        <span class="stat-label">Active Calls</span>
                        <div class="stat-value" id="dash-active">--</div>
                    </div>
                    <div class="stat-card warning">
                        <span class="stat-label">Waiting</span>
                        <div class="stat-value" id="dash-waiting">--</div>
                    </div>
                    <div class="stat-card success">
                        <span class="stat-label">Agents Live</span>
                        <div class="stat-value" id="dash-agents">--</div>
                    </div>
                    <div class="stat-card info">
                        <span class="stat-label">Total Calls</span>
                        <div class="stat-value" id="dash-total">--</div>
                    </div>
                    <div class="stat-card danger">
                        <span class="stat-label">Dropped %</span>
                        <div class="stat-value" id="dash-dropped">--</div>
                    </div>
                    <div class="stat-card purple">
                        <span class="stat-label">Agents In Call</span>
                        <div class="stat-value" id="dash-incall">--</div>
                    </div>
                </div>
                
                <div class="mini-stats">
                    <div class="mini-stat">
                        <span class="label">Ringing</span>
                        <span class="value" id="dash-ringing">--</span>
                    </div>
                    <div class="mini-stat">
                        <span class="label">IVR</span>
                        <span class="value" id="dash-ivr">--</span>
                    </div>
                    <div class="mini-stat">
                        <span class="label">Paused</span>
                        <span class="value" id="dash-paused">--</span>
                    </div>
                </div>
            </div>

            <!-- Tab: Agents -->
            <div id="tab-agents" class="tab-content">
                <div class="list-header">
                    <span>User</span>
                    <span>Status</span>
                    <span>Time</span>
                </div>
                <div id="agents-list" class="scrollable-list">
                    <!-- Populated by JS -->
                    <div class="empty-list">No agents online</div>
                </div>
            </div>

            <!-- Tab: Calls -->
            <div id="tab-calls" class="tab-content">
                <div class="list-header">
                    <span>Phone</span>
                    <span>Campaign</span>
                    <span>Wait</span>
                </div>
                <div id="calls-list" class="scrollable-list">
                    <!-- Populated by JS -->
                    <div class="empty-list">No calls waiting</div>
                </div>
            </div>

            <!-- Tab: Settings -->
            <div id="tab-settings" class="tab-content">
                <div class="settings-form">
                    <div class="section">
                        <label>Alert Thresholds</label>
                        <div class="form-group">
                            <label class="sub-label">Max Waiting Calls</label>
                            <input type="number" id="waitingCallsThreshold" min="1" class="input-dark">
                        </div>
                        <div class="form-group">
                            <label class="sub-label">Max Paused Agents</label>
                            <input type="number" id="pausedAgentsThreshold" min="1" class="input-dark">
                        </div>
                        <div class="form-group" style="margin-top: 15px;">
                            <label class="sub-label">Refresh Rate (ms)</label>
                            <input type="number" id="refreshRate" min="1000" step="1000" class="input-dark">
                        </div>
                    </div>

                    <button id="save-settings-btn" class="action-btn full-width">Save Settings</button>
                    <div id="settings-status" class="status-msg"></div>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="app-footer">
            <div class="footer-info">
                <span id="last-updated">Updated: --</span>
            </div>
            <div class="developer-credit">
                Dev: Mr. Zohaib
            </div>
        </footer>
    </div>

    <script src="utils.js"></script>
    <script src="popup.js"></script>
</body>
</html>
